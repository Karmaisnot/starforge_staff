server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Keep live API traffic on the application origin. Without this location,
    # /api/v1 requests fall through to index.html and return HTML instead of JSON.
    location /api/ {
        proxy_pass https://starforge.78.111.91.113.nip.io;
        proxy_ssl_server_name on;
        proxy_ssl_name starforge.78.111.91.113.nip.io;
        proxy_set_header Host starforge.78.111.91.113.nip.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # SPA history fallback — every route resolves to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache fingerprinted assets, never cache the HTML shell.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
